<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    color-scheme: dark;
  }
  body {
    width: 300px;
    padding: 18px;
    background: linear-gradient(160deg, #1c1c23 0%, #15151c 100%);
    color: rgba(255, 255, 255, 0.92);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                 "Helvetica Neue", system-ui, sans-serif;
    font-size: 13.5px;
    margin: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.1px;
  }
  h2 {
    background: linear-gradient(135deg, #5ac8fa 0%, #0a84ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 16px;
    letter-spacing: -0.3px;
  }
  label {
    display: block;
    margin-bottom: 6px;
    color: rgba(255, 255, 255, 0.55);
    font-size: 11.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  input {
    width: 100%;
    background: rgba(255, 255, 255, 0.06);
    border: 0.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    color: rgba(255, 255, 255, 0.95);
    font-size: 13px;
    padding: 9px 12px;
    box-sizing: border-box;
    margin-bottom: 12px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  input::placeholder { color: rgba(255, 255, 255, 0.32); }
  input:focus {
    border-color: rgba(10, 132, 255, 0.55);
    background: rgba(255, 255, 255, 0.08);
  }
  button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    transition: opacity 0.15s, transform 0.1s, background 0.15s;
    font-family: inherit;
    letter-spacing: -0.1px;
  }
  button:hover  { opacity: 0.92; }
  button:active { transform: scale(0.98); }

  #btn-save {
    background: linear-gradient(135deg, #0a84ff 0%, #0066cc 100%);
    color: white;
    box-shadow: 0 4px 14px rgba(10, 132, 255, 0.28);
  }
  #btn-auth {
    background: linear-gradient(135deg, #34c759 0%, #28a745 100%);
    color: white;
    box-shadow: 0 4px 14px rgba(52, 199, 89, 0.28);
  }

  hr {
    border: none;
    border-top: 0.5px solid rgba(255, 255, 255, 0.1);
    margin: 14px 0;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .row span:first-child {
    color: rgba(255, 255, 255, 0.7);
    font-size: 12.5px;
    font-weight: 500;
  }
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .badge.ok  {
    background: rgba(52, 199, 89, 0.18);
    color: #34c759;
    border: 0.5px solid rgba(52, 199, 89, 0.35);
  }
  .badge.err {
    background: rgba(255, 69, 58, 0.16);
    color: #ff6961;
    border: 0.5px solid rgba(255, 69, 58, 0.35);
  }
  #status { font-size: 12px; min-height: 18px; color: rgba(255, 255, 255, 0.7); }
</style>
</head>
<body>
<h2>⚡ JARVIS</h2>

<label>ASI:One API Key</label>
<input type="password" id="asi-key" placeholder="sk-..." />
<button id="btn-save">Save Key</button>

<hr>

<div class="row">
  <span>Google · Gmail + Calendar</span>
  <span id="google-badge" class="badge err">not connected</span>
</div>
<button id="btn-auth">Connect Google</button>

<div id="status"></div>

<script src="popup.js"></script>
<script src="popup_macros.js"></script>
</body>
</html>
